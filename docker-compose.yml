services:
  postgres:
    image: postgres:16-alpine
    container_name: tft-oracle-postgres
    environment:
      POSTGRES_USER: tft_user
      POSTGRES_PASSWORD: tft_pass
      POSTGRES_DB: tft_oracle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tft-oracle-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
